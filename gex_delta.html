<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEX Delta Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:     #1a1a2e;
            --bg2:    #16213e;
            --bg3:    #0f3460;
            --text:   #e0e0e0;
            --text2:  #a0a0b0;
            --accent: #e94560;
            --border: #2d3436;
            --green:  #00b894;
            --red:    #e17055;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 960px; margin: 0 auto; }
        .header { text-align: center; padding: 36px 20px 20px; }
        .header h1 { font-size: 1.9em; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text2); font-size: 0.92em; margin-top: 6px; }
        .subtitle.warning { color: #fdcb6e; }
        .tabs {
            display: flex; gap: 10px; justify-content: center;
            margin: 24px 0 16px;
        }
        .tab-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 6px;
            padding: 8px 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.15s;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--text); }
        .tab-btn.active {
            background: var(--bg3);
            border-color: var(--accent);
            color: #fff;
        }
        .chart-wrap {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            height: 520px;
        }
        .chart-wrap canvas { width: 100% !important; height: 100% !important; }
        .legend {
            display: flex; gap: 24px; justify-content: center;
            margin: 14px 0 4px; font-size: 0.85em; color: var(--text2);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
        .footer {
            text-align: center; margin-top: 36px; padding: 16px;
            color: var(--text2); font-size: 0.82em;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>GEX Delta</h1>
        <div class="subtitle">Change in Gamma Exposure per strike since last snapshot</div>
        <div class="subtitle">Current: <b>2026-04-27 07:58</b> &nbsp;|&nbsp; Previous: <b>2026-04-27 07:46</b></div>
    </div>

    <div class="tabs">
            <button class="tab-btn" data-inst="ES" onclick="switchTab('ES')">ES</button>
            <button class="tab-btn" data-inst="NQ" onclick="switchTab('NQ')">NQ</button>
            <button class="tab-btn" data-inst="CL" onclick="switchTab('CL')">CL</button>
            <button class="tab-btn" data-inst="GC" onclick="switchTab('GC')">GC</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> GEX increased</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> GEX decreased</div>
    </div>

        <div class="chart-wrap" id="wrap-ES" style="display:block"><canvas id="chart-ES"></canvas></div>
        <div class="chart-wrap" id="wrap-NQ" style="display:none"><canvas id="chart-NQ"></canvas></div>
        <div class="chart-wrap" id="wrap-CL" style="display:none"><canvas id="chart-CL"></canvas></div>
        <div class="chart-wrap" id="wrap-GC" style="display:none"><canvas id="chart-GC"></canvas></div>

    <div class="footer">
        Data source: CBOE (options OI + gamma) &nbsp;|&nbsp; Prices: Yahoo Finance (~15 min delayed for futures)<br>
        Generated: 2026-04-27 07:58
    </div>
</div>

<script>
    const charts = {};

    function switchTab(inst) {
        document.querySelectorAll('.chart-wrap').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('wrap-' + inst).style.display = 'block';
        document.querySelector('[data-inst="' + inst + '"]').classList.add('active');
    }

    // Initialise charts after DOM ready
    window.addEventListener('DOMContentLoaded', () => {
        
    charts['ES'] = new Chart(document.getElementById('chart-ES'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: [],
                borderColor: 'transparent',
                barThickness: 14,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => (ctx.raw >= 0 ? '+' : '') + ctx.raw.toFixed(1) + 'M'
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.07)' },
                    ticks: { color: '#a0a0b0', callback: v => v + 'M' },
                    title: { display: true, text: 'Change in GEX (Millions)', color: '#a0a0b0' }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.04)' },
                    ticks: { color: '#e0e0e0', font: { size: 11 } }
                }
            }
        }
    });

    charts['NQ'] = new Chart(document.getElementById('chart-NQ'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: [],
                borderColor: 'transparent',
                barThickness: 14,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => (ctx.raw >= 0 ? '+' : '') + ctx.raw.toFixed(1) + 'M'
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.07)' },
                    ticks: { color: '#a0a0b0', callback: v => v + 'M' },
                    title: { display: true, text: 'Change in GEX (Millions)', color: '#a0a0b0' }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.04)' },
                    ticks: { color: '#e0e0e0', font: { size: 11 } }
                }
            }
        }
    });

    charts['CL'] = new Chart(document.getElementById('chart-CL'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: [],
                borderColor: 'transparent',
                barThickness: 14,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => (ctx.raw >= 0 ? '+' : '') + ctx.raw.toFixed(1) + 'M'
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.07)' },
                    ticks: { color: '#a0a0b0', callback: v => v + 'M' },
                    title: { display: true, text: 'Change in GEX (Millions)', color: '#a0a0b0' }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.04)' },
                    ticks: { color: '#e0e0e0', font: { size: 11 } }
                }
            }
        }
    });

    charts['GC'] = new Chart(document.getElementById('chart-GC'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: [],
                borderColor: 'transparent',
                barThickness: 14,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => (ctx.raw >= 0 ? '+' : '') + ctx.raw.toFixed(1) + 'M'
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.07)' },
                    ticks: { color: '#a0a0b0', callback: v => v + 'M' },
                    title: { display: true, text: 'Change in GEX (Millions)', color: '#a0a0b0' }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.04)' },
                    ticks: { color: '#e0e0e0', font: { size: 11 } }
                }
            }
        }
    });
        // Activate first tab
        document.querySelector('[data-inst="ES"]').classList.add('active');
    });
</script>
</body>
</html>
