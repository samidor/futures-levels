            padding: 20px;

        .subtitle { color: var(--text2); font-size: 0.92em; margin-top: 6px; }
        .subtitle.warning { color: #fdcb6e; }
        .tabs {
            display: flex; gap: 10px; justify-content: center;
            margin: 24px 0 16px;
        }
        .tab-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 6px;
            padding: 8px 24px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.15s;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--text); }
        .tab-btn.active {
            background: var(--bg3);
            border-color: var(--accent);
            color: #fff;
        }
        .chart-wrap {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            /* height set per-instrument via inline style */
        }
        .chart-wrap canvas { width: 100% !important; height: 100% !important; }
        .legend {
            display: flex; gap: 24px; justify-content: center;
            margin: 14px 0 4px; font-size: 0.85em; color: var(--text2);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
        .footer {
