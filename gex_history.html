<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Historical GEX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f3460;
    --text:#e0e0e0; --text2:#a0a0b0; --border:rgba(255,255,255,0.1);
    --cyan:#00cec9; --red:#e17055;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
  a{color:var(--cyan);text-decoration:none}
  a:hover{text-decoration:underline}

  .page-header{text-align:center;padding:28px 16px 12px}
  .page-header h1{font-size:1.6rem;font-weight:700;margin-bottom:6px}
  .page-header .sub{color:var(--text2);font-size:0.85rem}
  .back-link{font-size:0.82rem;margin-top:8px;display:block}

  .section-wrap{max-width:1100px;margin:0 auto;padding:0 16px 48px}

  /* Live today section */
  .live-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:32px}
  .live-section-title{font-size:1rem;font-weight:600;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* Instrument & expiry buttons */
  .hinst-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .hinst-btn{padding:5px 14px;border:1px solid var(--border);border-radius:4px;background:transparent;
              color:var(--text2);cursor:pointer;font-size:0.82rem;transition:all .15s}
  .hinst-btn.active{background:rgba(116,185,255,0.15);border-color:#74b9ff;color:#74b9ff}
  .hexp-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .hexp-btn{padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:transparent;
             cursor:pointer;font-size:0.8rem;color:var(--text2);transition:all .15s}
  .hexp-btn.active{color:#fff !important;background:rgba(255,255,255,0.08)}

  /* Chart area */
  .chart-area{position:relative;min-height:300px}

  /* Time slider */
  .slider-wrap{margin-top:16px;padding:12px 0 4px}
  .slider-label{color:var(--text2);font-size:0.78rem;margin-bottom:6px;display:flex;justify-content:space-between}
  input[type=range]{width:100%;accent-color:var(--cyan);cursor:pointer}
  .slider-time{font-size:0.9rem;color:var(--cyan);font-weight:600;text-align:center;margin-top:4px}

  /* Past day cards */
  .past-section-title{font-size:0.9rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;
                       margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .hday-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px}
  .hday-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .hday-title{font-weight:600;font-size:1rem}
  .hday-badge{background:var(--bg3);border-radius:4px;padding:2px 8px;font-size:0.75rem;color:var(--text2)}
  .hday-inst{}

  .no-data{color:var(--text2);font-size:0.85rem;padding:30px;text-align:center}
</style>
</head>

var _selInst = "SPY";
var _selExp  = "2026-05-06";
var _liveChart = null;
var _snapIdx = -1;   // -1 = latest

/* ── Render live chart ───────────────────────────────────────── */
function renderLive() {
    var instData = DATA[_selInst] || {};
    var expData  = instData[_selExp];
    var noData   = document.getElementById('live-no-data');
    var sliderWrap = document.getElementById('live-slider-wrap');

    if (!expData || !expData.series || expData.series.length === 0) {
        if (_liveChart) { _liveChart.destroy(); _liveChart = null; }
        document.getElementById('live-chart-wrap').style.display = 'none';
        sliderWrap.style.display = 'none';
        noData.style.display = 'block';
        return;
    }
    noData.style.display = 'none';
    document.getElementById('live-chart-wrap').style.display = 'block';

    var series = expData.series;
    var slider = document.getElementById('live-slider');
    slider.max = series.length - 1;
    if (_snapIdx < 0 || _snapIdx >= series.length) _snapIdx = series.length - 1;
    slider.value = _snapIdx;
    document.getElementById('live-slider-time').textContent = series[_snapIdx].t;
    sliderWrap.style.display = series.length > 1 ? 'block' : 'none';

    var snap = series[_snapIdx];
    /* Sort strikes descending */
    var keys  = Object.keys(snap.s).sort(function(a,b){return parseFloat(b)-parseFloat(a);});
    var vals  = keys.map(function(k){return snap.s[k];});
    var colors= vals.map(function(v){return v>=0?'#00cec9':'#e17055';});
    var labels= keys.map(function(k){
        var f=parseFloat(k); return f===Math.round(f)?String(Math.round(f)):k;
    });
    var h = Math.max(300, keys.length * 30 + 80);
    document.getElementById('live-chart-wrap').style.height = h + 'px';

    var cfg = {
        type:'bar',
        data:{labels:labels,datasets:[{
            data:vals, backgroundColor:colors,
            borderColor:'transparent', barThickness:16
        }]},
        options:{
            indexAxis:'y', responsive:true, maintainAspectRatio:false,
            plugins:{
                legend:{display:false},
                tooltip:{callbacks:{label:function(c){return (c.raw>=0?'+':'')+c.raw.toFixed(2)+'M';}}}
            },
            scales:{
                x:{grid:{color:'rgba(255,255,255,0.07)'},
                   ticks:{color:'#a0a0b0',callback:function(v){return v+'M';}},
                   title:{display:true,text:'Net GEX (M)',color:'#a0a0b0'}},
                y:{grid:{color:'rgba(255,255,255,0.04)'},
                   ticks:{color:'#e0e0e0',font:{size:11}}}
            }
        }
    };
    if (_liveChart) _liveChart.destroy();
    _liveChart = new Chart(document.getElementById('live-chart'), cfg);
}

/* ── Controls ────────────────────────────────────────────────── */
function selectInst(inst) {
    _selInst = inst;
    _snapIdx = -1;
    document.querySelectorAll('#live-inst-bar .hinst-btn').forEach(function(b){
        b.classList.toggle('active', b.textContent === inst);
    });
    renderLive();
}

function selectExp(exp) {
    _selExp  = exp;
    _snapIdx = -1;
    document.querySelectorAll('#live-exp-tabs .hexp-btn').forEach(function(b){
        b.classList.toggle('active', b.onclick && b.onclick.toString().indexOf('"'+exp+'"')>=0 ||
            b.getAttribute('onclick').indexOf("'"+exp+"'")>=0);
    });
    renderLive();
}

document.getElementById('live-slider').addEventListener('input', function() {
    _snapIdx = parseInt(this.value);
    var series = ((DATA[_selInst]||{})[_selExp]||{}).series || [];
    if (series[_snapIdx]) document.getElementById('live-slider-time').textContent = series[_snapIdx].t;
    renderLive();
});

/* ── Past-day controls ───────────────────────────────────────── */
function showDayInst(date, inst) {
    var card = document.getElementById('hcard-'+date);
    if (!card) return;
    card.querySelectorAll('.hday-inst').forEach(function(el){el.style.display='none';});
    var target = card.querySelector('[data-inst="'+inst+'"]');
    if (target) target.style.display = 'block';
    card.querySelectorAll('.hinst-btn').forEach(function(b){
        b.classList.toggle('active', b.textContent===inst);
    });
}

function showExp(date, inst, exp) {
    var card = document.getElementById('hcard-'+date);
    if (!card) return;
    var instEl = card.querySelector('[data-inst="'+inst+'"]');
    if (!instEl) return;
    instEl.querySelectorAll('[id^="hexp-"]').forEach(function(el){el.style.display='none';});
    var target = instEl.querySelector('#hexp-'+date+'-'+inst+'-'+exp.replace(/-/g,''));
    if (target) target.style.display = 'block';
    instEl.querySelectorAll('.hexp-btn').forEach(function(b){
        b.classList.toggle('active', b.getAttribute('onclick').indexOf("'"+exp+"'")>=0);
    });
}

/* ── Init ────────────────────────────────────────────────────── */
renderLive();
</script>
